[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1

pm = dynamic
pm.max_children = 16
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

clear_env = no

php_admin_value[error_log] = /var/log/elektron-faucet/php-fpm.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 128M

env[FAUCET_CONFIG] = /etc/elektron-faucet/config.php
