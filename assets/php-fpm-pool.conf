[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000
listen.allowed_clients = 127.0.0.1

pm = dynamic
pm.max_children = 16
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

clear_env = no

; Send everything PHP says (warnings, fatals, var_dumps from debug code)
; to stderr so StartOS's service log captures it. Without this the
; messages get lost under /var/log/elektron-faucet inside the container
; and you have no way to see them from the StartOS UI.
access.log = /proc/self/fd/2
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 128M

catch_workers_output = yes
decorate_workers_output = no

env[FAUCET_CONFIG] = /etc/elektron-faucet/config.php
